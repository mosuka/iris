name: Regression

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  # ============================================================
  # Detect Changes
  # ------------------------------------------------------------
  # Analyze PR diffs and output change flags for each package.
  # For push (main) / workflow_dispatch, default all flags to true.
  # ============================================================
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      code: ${{ steps.resolve.outputs.code }}
      laurus: ${{ steps.resolve.outputs.laurus }}
      cli: ${{ steps.resolve.outputs.cli }}
      server: ${{ steps.resolve.outputs.server }}
      mcp: ${{ steps.resolve.outputs.mcp }}
      python: ${{ steps.resolve.outputs.python }}
      nodejs: ${{ steps.resolve.outputs.nodejs }}
      wasm: ${{ steps.resolve.outputs.wasm }}
      ruby: ${{ steps.resolve.outputs.ruby }}
    steps:
      - name: Run checkout
        uses: actions/checkout@v6

      # Detect file changes on PR events only.
      # For push / workflow_dispatch, this step is skipped and
      # the Resolve outputs step falls back to true for all flags.
      - name: Detect file changes
        uses: dorny/paths-filter@v4
        id: filter
        if: github.event_name == 'pull_request'
        with:
          filters: |
            # code: triggers format + clippy
            code:
              - '**/*.rs'
              - '**/Cargo.toml'
              - 'Cargo.lock'
              - 'laurus-server/proto/**'
              - '.github/workflows/regression.yml'
            # laurus: core library
            laurus:
              - 'laurus/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - '.github/workflows/regression.yml'
            # cli: laurus-cli depends on laurus, laurus-mcp
            cli:
              - 'laurus-cli/**'
              - 'laurus/**'
              - 'laurus-mcp/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - '.github/workflows/regression.yml'
            # server: laurus-server depends on laurus and has proto files
            server:
              - 'laurus-server/**'
              - 'laurus/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - '.github/workflows/regression.yml'
            # mcp: laurus-mcp depends on laurus
            mcp:
              - 'laurus-mcp/**'
              - 'laurus/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - '.github/workflows/regression.yml'
            # python: laurus-python depends on laurus
            python:
              - 'laurus-python/**'
              - 'laurus/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - '.github/workflows/regression.yml'
            # nodejs: laurus-nodejs depends on laurus
            nodejs:
              - 'laurus-nodejs/**'
              - 'laurus/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - '.github/workflows/regression.yml'
            # ruby: laurus-ruby depends on laurus
            ruby:
              - 'laurus-ruby/**'
              - 'laurus/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - '.github/workflows/regression.yml'
            # wasm: laurus-wasm depends on laurus
            wasm:
              - 'laurus-wasm/**'
              - 'laurus/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - '.github/workflows/regression.yml'

      # For non-PR events (push / workflow_dispatch), filter outputs are empty.
      # Default to true so all jobs run.
      - name: Resolve outputs
        id: resolve
        env:
          CODE: ${{ steps.filter.outputs.code }}
          LAURUS: ${{ steps.filter.outputs.laurus }}
          CLI: ${{ steps.filter.outputs.cli }}
          SERVER: ${{ steps.filter.outputs.server }}
          MCP: ${{ steps.filter.outputs.mcp }}
          PYTHON: ${{ steps.filter.outputs.python }}
          NODEJS: ${{ steps.filter.outputs.nodejs }}
          WASM: ${{ steps.filter.outputs.wasm }}
          RUBY: ${{ steps.filter.outputs.ruby }}
        run: |
          echo "code=${CODE:-true}" >> "$GITHUB_OUTPUT"
          echo "laurus=${LAURUS:-true}" >> "$GITHUB_OUTPUT"
          echo "cli=${CLI:-true}" >> "$GITHUB_OUTPUT"
          echo "server=${SERVER:-true}" >> "$GITHUB_OUTPUT"
          echo "mcp=${MCP:-true}" >> "$GITHUB_OUTPUT"
          echo "python=${PYTHON:-true}" >> "$GITHUB_OUTPUT"
          echo "nodejs=${NODEJS:-true}" >> "$GITHUB_OUTPUT"
          echo "wasm=${WASM:-true}" >> "$GITHUB_OUTPUT"
          echo "ruby=${RUBY:-true}" >> "$GITHUB_OUTPUT"

  # ============================================================
  # Format code with rustfmt
  # ============================================================
  format:
    name: Format
    needs: [changes]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Run checkout
        uses: actions/checkout@v6

      - name: Install toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          components: rustfmt

      - name: Run format
        run: cargo fmt --all -- --check

  # ============================================================
  # Lint with clippy
  # ============================================================
  clippy:
    name: Clippy
    needs: [changes, format]
    if: ${{ !failure() && !cancelled() && needs.changes.outputs.code == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Run checkout
        uses: actions/checkout@v6

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "24.x"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          components: clippy

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "stable-x86_64-unknown-linux-gnu"

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  # ============================================================
  # Test laurus (core library)
  # ============================================================
  test-laurus:
    name: Test laurus
    needs: [changes, clippy]
    if: ${{ !failure() && !cancelled() && needs.changes.outputs.laurus == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            skip_embedding_features: true
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
        toolchain: [stable]
    runs-on: ${{ matrix.platform.runner }}
    steps:
      - name: Run checkout
        uses: actions/checkout@v6

      - name: Install toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ matrix.toolchain }}
          target: ${{ matrix.platform.target }}

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "${{ matrix.toolchain }}-${{ matrix.platform.target }}"

      - name: Run test
        shell: bash
        run: |
          if [ "${{ matrix.platform.skip_embedding_features }}" == "true" ]; then
            FEATURES=""
          else
            FEATURES="--all-features"
          fi

          cargo test --package laurus --target "${{ matrix.platform.target }}" $FEATURES

  # ============================================================
  # Test laurus-server
  # ============================================================
  test-server:
    name: Test laurus-server
    needs: [changes, test-laurus]
    if: ${{ !failure() && !cancelled() && needs.changes.outputs.server == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            skip_embedding_features: true
        toolchain: [stable]
    runs-on: ${{ matrix.platform.runner }}
    steps:
      - name: Run checkout
        uses: actions/checkout@v6

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "24.x"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ matrix.toolchain }}
          target: ${{ matrix.platform.target }}

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "${{ matrix.toolchain }}-${{ matrix.platform.target }}"

      - name: Run test
        shell: bash
        run: |
          if [ "${{ matrix.platform.skip_embedding_features }}" == "true" ]; then
            FEATURES=""
          else
            FEATURES="--all-features"
          fi

          cargo test --package laurus-server --target "${{ matrix.platform.target }}" $FEATURES

  # ============================================================
  # Test laurus-mcp
  # ============================================================
  test-mcp:
    name: Test laurus-mcp
    needs: [changes, test-laurus, test-server]
    if: ${{ !failure() && !cancelled() && needs.changes.outputs.mcp == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            skip_embedding_features: true
        toolchain: [stable]
    runs-on: ${{ matrix.platform.runner }}
    steps:
      - name: Run checkout
        uses: actions/checkout@v6

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "24.x"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ matrix.toolchain }}
          target: ${{ matrix.platform.target }}

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "${{ matrix.toolchain }}-${{ matrix.platform.target }}"

      - name: Run test
        shell: bash
        run: |
          if [ "${{ matrix.platform.skip_embedding_features }}" == "true" ]; then
            FEATURES=""
          else
            FEATURES="--all-features"
          fi

          cargo test --package laurus-mcp --target "${{ matrix.platform.target }}" $FEATURES

  # ============================================================
  # Test laurus-cli
  # ============================================================
  test-cli:
    name: Test laurus-cli
    needs: [changes, test-laurus, test-server, test-mcp]
    if: ${{ !failure() && !cancelled() && needs.changes.outputs.cli == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            skip_embedding_features: true
        toolchain: [stable]
    runs-on: ${{ matrix.platform.runner }}
    steps:
      - name: Run checkout
        uses: actions/checkout@v6

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "24.x"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ matrix.toolchain }}
          target: ${{ matrix.platform.target }}

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "${{ matrix.toolchain }}-${{ matrix.platform.target }}"

      - name: Run test
        shell: bash
        run: |
          if [ "${{ matrix.platform.skip_embedding_features }}" == "true" ]; then
            FEATURES=""
          else
            FEATURES="--all-features"
          fi

          cargo test --package laurus-cli --target "${{ matrix.platform.target }}" $FEATURES

  # ============================================================
  # Test laurus-python
  # ============================================================
  test-python:
    name: Test laurus-python
    needs: [changes, test-laurus]
    if: ${{ !failure() && !cancelled() && needs.changes.outputs.python == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            skip_embedding_features: true
        python: ["3.13"]
    runs-on: ${{ matrix.platform.runner }}
    steps:
      - name: Run checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}

      - name: Install toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "stable-${{ matrix.platform.target }}"

      - name: Run tests
        working-directory: laurus-python
        shell: bash
        run: |
          python -m venv .venv
          if [ "$RUNNER_OS" == "Windows" ]; then
            source .venv/Scripts/activate
          else
            source .venv/bin/activate
          fi
          pip install maturin pytest
          if [ "${{ matrix.platform.skip_embedding_features }}" == "true" ]; then
            maturin develop
          else
            maturin develop --features embeddings-all
          fi
          pytest tests/ -v

  # ============================================================
  # Test laurus-nodejs
  # ============================================================
  test-nodejs:
    name: Test laurus-nodejs
    needs: [changes, test-laurus]
    if: ${{ !failure() && !cancelled() && needs.changes.outputs.nodejs == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
        node: ["22"]
    runs-on: ${{ matrix.platform.runner }}
    steps:
      - name: Run checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}

      - name: Install toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "stable-${{ matrix.platform.target }}"

      - name: Run tests
        working-directory: laurus-nodejs
        shell: bash
        run: |
          npm install
          npm run build:debug
          npm test

  # ============================================================
  # Test laurus-wasm
  # ============================================================
  test-wasm:
    name: Test laurus-wasm
    needs: [changes, test-laurus]
    if: ${{ !failure() && !cancelled() && needs.changes.outputs.wasm == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Run checkout
        uses: actions/checkout@v6

      - name: Install toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          target: wasm32-unknown-unknown

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "stable-wasm32-unknown-unknown"

      - name: Build
        run: cargo build -p laurus-wasm --target wasm32-unknown-unknown

      - name: Run clippy
        run: cargo clippy -p laurus-wasm --target wasm32-unknown-unknown -- -D warnings

  # ============================================================
  # Test laurus-ruby
  # ============================================================
  test-ruby:
    name: Test laurus-ruby
    needs: [changes, test-laurus]
    if: ${{ !failure() && !cancelled() && needs.changes.outputs.ruby == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
        ruby: ["3.2"]
    runs-on: ${{ matrix.platform.runner }}
    steps:
      - name: Run checkout
        uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true
          working-directory: laurus-ruby

      - name: Install toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "stable-${{ matrix.platform.target }}"

      - name: Run tests
        working-directory: laurus-ruby
        shell: bash
        run: |
          bundle install
          bundle exec rake compile
          bundle exec ruby -Ilib -Itest -e 'Dir["test/test_*.rb"].each { |f| require_relative f }'

  # ============================================================
  # Gate: ensure all tests pass
  # ============================================================
  test-all:
    name: Test All
    if: ${{ !failure() && !cancelled() }}
    needs:
      [test-laurus, test-cli, test-server, test-mcp, test-python, test-nodejs, test-wasm, test-ruby]
    runs-on: ubuntu-latest
    steps:
      - name: All tests passed
        run: echo "All tests passed"
