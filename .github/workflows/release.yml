name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*"

jobs:
  format:
    name: Format
    strategy:
      matrix:
        platform:
          - runner: ubuntu-latest
        toolchain: [stable]
    runs-on: ${{ matrix.platform.runner }}
    steps:
      - name: Run checkout
        uses: actions/checkout@v6

      - name: Install toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ matrix.toolchain }}
          components: rustfmt

      - name: Run format
        run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    needs: [format]
    strategy:
      matrix:
        platform:
          - runner: ubuntu-latest
        toolchain: [stable]
    runs-on: ${{ matrix.platform.runner }}
    steps:
      - name: Run checkout
        uses: actions/checkout@v6

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "24.x"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ matrix.toolchain }}
          components: clippy

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    name: Test
    needs: [clippy]
    strategy:
      matrix:
        platform:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            skip_embedding_features: true
          - runner: macos-latest
            target: aarch64-apple-darwin
          - runner: macos-15-intel
            target: x86_64-apple-darwin
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
          - runner: windows-latest
            target: aarch64-pc-windows-msvc
            skip_test_run: true
            skip_embedding_features: true
        toolchain: [stable]
    runs-on: ${{ matrix.platform.runner }}
    steps:
      - name: Run checkout
        uses: actions/checkout@v6

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "24.x"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ matrix.toolchain }}
          target: ${{ matrix.platform.target }}

      - name: Run test
        shell: bash
        run: |
          if [ "${{ matrix.platform.skip_embedding_features }}" == "true" ]; then
            FEATURES=""
          else
            FEATURES="--all-features"
          fi

          if [ "${{ matrix.platform.skip_test_run }}" == "true" ]; then
            cargo check --target "${{ matrix.platform.target }}" $FEATURES
          else
            cargo test --target "${{ matrix.platform.target }}" $FEATURES
          fi

  build-binary:
    name: Build Binary
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [test]
    strategy:
      matrix:
        platform:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: laurus
            archive: tar.gz
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            binary: laurus
            archive: tar.gz
          - runner: macos-latest
            target: aarch64-apple-darwin
            binary: laurus
            archive: tar.gz
          - runner: macos-15-intel
            target: x86_64-apple-darwin
            binary: laurus
            archive: tar.gz
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
            binary: laurus.exe
            archive: zip
          - runner: windows-latest
            target: aarch64-pc-windows-msvc
            binary: laurus.exe
            archive: zip
    runs-on: ${{ matrix.platform.runner }}
    steps:
      - name: Run checkout
        uses: actions/checkout@v6

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "24.x"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          target: ${{ matrix.platform.target }}

      - name: Build binary
        run: cargo build --release --target ${{ matrix.platform.target }} -p laurus-cli

      - name: Package binary (Unix)
        if: runner.os == 'Linux' || runner.os == 'macOS'
        run: |
          tar \
            -czf "laurus-${{ github.ref_name }}-${{ matrix.platform.target }}.tar.gz" \
            -C "target/${{ matrix.platform.target }}/release" "${{ matrix.platform.binary }}"

      - name: Package binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive `
            -Path "target/${{ matrix.platform.target }}/release/${{ matrix.platform.binary }}" `
            -DestinationPath "laurus-${{ github.ref_name }}-${{ matrix.platform.target }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: laurus-${{ matrix.platform.target }}
          path: laurus-${{ github.ref_name }}-${{ matrix.platform.target }}.${{ matrix.platform.archive }}

  create-release:
    name: Create Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-binary]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: laurus-*
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          make_latest: true
          files: artifacts/*

  publish-crates:
    name: Publish crates
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [create-release]
    runs-on: ubuntu-latest
    steps:
      - name: Run checkout
        uses: actions/checkout@v6

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "24.x"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable

      - name: Publish crates
        run: |
          for crate in laurus laurus-server laurus-cli; do
            VERSION=$(cargo metadata --no-deps --format-version=1 | jq -r ".packages[] | select(.name==\"$crate\") | .version")
            PUBLISHED_VERSIONS=$(curl -s -A "laurus-release-workflow (https://github.com/mosuka/laurus)" "https://crates.io/api/v1/crates/$crate" | jq -r 'select(.versions != null) | .versions[].num')
            if echo "${PUBLISHED_VERSIONS}" | grep -Fx "${VERSION}" >/dev/null; then
              echo "$crate $VERSION has already published"
            else
              echo "Publishing $crate $VERSION..."
              pushd $crate
              cargo publish
              popd
              sleep 20
            fi
          done
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
