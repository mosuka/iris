name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*"

jobs:
  # ============================================================
  # Format code with rustfmt
  # ============================================================
  format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - name: Run checkout
        uses: actions/checkout@v6

      - name: Install toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          components: rustfmt

      - name: Run format
        run: cargo fmt --all -- --check

  # ============================================================
  # Lint with clippy
  # ============================================================
  clippy:
    name: Clippy
    needs: [format]
    runs-on: ubuntu-latest
    steps:
      - name: Run checkout
        uses: actions/checkout@v6

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "24.x"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          components: clippy

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "stable-x86_64-unknown-linux-gnu"

      - name: Run clippy
        run: cargo clippy --all-targets --features embeddings-all -- -D warnings

  # ============================================================
  # Test laurus (core library)
  # ============================================================
  test-laurus:
    name: Test laurus
    needs: [clippy]
    strategy:
      fail-fast: false
      matrix:
        platform:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            skip_embedding_features: true
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
        toolchain: [stable]
    runs-on: ${{ matrix.platform.runner }}
    steps:
      - name: Run checkout
        uses: actions/checkout@v6

      - name: Install toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ matrix.toolchain }}
          target: ${{ matrix.platform.target }}

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "${{ matrix.toolchain }}-${{ matrix.platform.target }}"

      - name: Run test
        shell: bash
        run: |
          if [ "${{ matrix.platform.skip_embedding_features }}" == "true" ]; then
            FEATURES=""
          else
            FEATURES="--features embeddings-all"
          fi

          cargo test --package laurus --target "${{ matrix.platform.target }}" $FEATURES

  # ============================================================
  # Test laurus-server
  # ============================================================
  test-server:
    name: Test laurus-server
    needs: [test-laurus]
    strategy:
      fail-fast: false
      matrix:
        platform:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            skip_embedding_features: true
        toolchain: [stable]
    runs-on: ${{ matrix.platform.runner }}
    steps:
      - name: Run checkout
        uses: actions/checkout@v6

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "24.x"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ matrix.toolchain }}
          target: ${{ matrix.platform.target }}

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "${{ matrix.toolchain }}-${{ matrix.platform.target }}"

      - name: Run test
        shell: bash
        run: |
          if [ "${{ matrix.platform.skip_embedding_features }}" == "true" ]; then
            FEATURES=""
          else
            FEATURES="--features embeddings-all"
          fi

          cargo test --package laurus-server --target "${{ matrix.platform.target }}" $FEATURES

  # ============================================================
  # Test laurus-mcp
  # ============================================================
  test-mcp:
    name: Test laurus-mcp
    needs: [test-laurus, test-server]
    strategy:
      fail-fast: false
      matrix:
        platform:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            skip_embedding_features: true
        toolchain: [stable]
    runs-on: ${{ matrix.platform.runner }}
    steps:
      - name: Run checkout
        uses: actions/checkout@v6

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "24.x"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ matrix.toolchain }}
          target: ${{ matrix.platform.target }}

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "${{ matrix.toolchain }}-${{ matrix.platform.target }}"

      - name: Run test
        shell: bash
        run: |
          if [ "${{ matrix.platform.skip_embedding_features }}" == "true" ]; then
            FEATURES=""
          else
            FEATURES="--features embeddings-all"
          fi

          cargo test --package laurus-mcp --target "${{ matrix.platform.target }}" $FEATURES

  # ============================================================
  # Test laurus-cli
  # ============================================================
  test-cli:
    name: Test laurus-cli
    needs: [test-laurus, test-server, test-mcp]
    strategy:
      fail-fast: false
      matrix:
        platform:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            skip_embedding_features: true
        toolchain: [stable]
    runs-on: ${{ matrix.platform.runner }}
    steps:
      - name: Run checkout
        uses: actions/checkout@v6

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "24.x"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ matrix.toolchain }}
          target: ${{ matrix.platform.target }}

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "${{ matrix.toolchain }}-${{ matrix.platform.target }}"

      - name: Run test
        shell: bash
        run: |
          if [ "${{ matrix.platform.skip_embedding_features }}" == "true" ]; then
            FEATURES=""
          else
            FEATURES="--features embeddings-all"
          fi

          cargo test --package laurus-cli --target "${{ matrix.platform.target }}" $FEATURES

  # ============================================================
  # Test laurus-python
  # ============================================================
  test-python:
    name: Test laurus-python
    needs: [test-laurus]
    strategy:
      fail-fast: false
      matrix:
        platform:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            skip_embedding_features: true
        python: ["3.13"]
    runs-on: ${{ matrix.platform.runner }}
    steps:
      - name: Run checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}

      - name: Install toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "stable-${{ matrix.platform.target }}"

      - name: Run tests
        working-directory: laurus-python
        shell: bash
        run: |
          python -m venv .venv
          if [ "$RUNNER_OS" == "Windows" ]; then
            source .venv/Scripts/activate
          else
            source .venv/bin/activate
          fi
          pip install maturin pytest
          if [ "${{ matrix.platform.skip_embedding_features }}" == "true" ]; then
            maturin develop
          else
            maturin develop --features embeddings-all
          fi
          pytest tests/ -v

  # ============================================================
  # Test laurus-nodejs
  # ============================================================
  test-nodejs:
    name: Test laurus-nodejs
    needs: [test-laurus]
    strategy:
      fail-fast: false
      matrix:
        platform:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
        node: ["22"]
    runs-on: ${{ matrix.platform.runner }}
    steps:
      - name: Run checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}

      - name: Install toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "stable-${{ matrix.platform.target }}"

      - name: Run tests
        working-directory: laurus-nodejs
        shell: bash
        run: |
          npm install
          npm run build:debug
          npm test

  # ============================================================
  # Test laurus-ruby
  # ============================================================
  test-ruby:
    name: Test laurus-ruby
    needs: [test-laurus]
    strategy:
      fail-fast: false
      matrix:
        platform:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
        ruby: ["4.0"]
    runs-on: ${{ matrix.platform.runner }}
    steps:
      - name: Run checkout
        uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true
          working-directory: laurus-ruby

      - name: Install toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "stable-${{ matrix.platform.target }}"

      - name: Run tests
        working-directory: laurus-ruby
        shell: bash
        run: |
          bundle install
          bundle exec rake compile
          bundle exec ruby -Ilib -Itest -e 'Dir["test/test_*.rb"].each { |f| require_relative f }'

  # ============================================================
  # Test laurus-php
  # ============================================================
  test-php:
    name: Test laurus-php
    needs: [test-laurus]
    strategy:
      fail-fast: false
      matrix:
        platform:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            skip_embedding_features: true
        php: ["8.5"]
    runs-on: ${{ matrix.platform.runner }}
    steps:
      - name: Run checkout
        uses: actions/checkout@v6

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}

      - name: Install toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "stable-${{ matrix.platform.target }}"

      - name: Build PHP extension
        shell: bash
        run: |
          if [ "$RUNNER_OS" == "macOS" ]; then
            export RUSTFLAGS="-C link-args=-Wl,-undefined,dynamic_lookup"
          fi
          if [ "${{ matrix.platform.skip_embedding_features }}" == "true" ]; then
            cargo build --release -p laurus-php
          else
            cargo build --release -p laurus-php --features embeddings-all
          fi

      - name: Run tests
        working-directory: laurus-php
        shell: bash
        run: |
          composer install
          php -d extension=../target/release/liblaurus_php.so vendor/bin/phpunit tests/LaurusTest.php

  # ============================================================
  # Test laurus-wasm
  # ============================================================
  test-wasm:
    name: Test laurus-wasm
    needs: [test-laurus]
    runs-on: ubuntu-latest
    steps:
      - name: Run checkout
        uses: actions/checkout@v6

      - name: Install toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          target: wasm32-unknown-unknown

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "stable-wasm32-unknown-unknown"

      - name: Build
        run: cargo build -p laurus-wasm --target wasm32-unknown-unknown

      - name: Run clippy
        run: cargo clippy -p laurus-wasm --target wasm32-unknown-unknown -- -D warnings

  # ============================================================
  # Gate: ensure all tests pass before proceeding to build
  # ============================================================
  test-all:
    name: Test All
    if: ${{ !failure() && !cancelled() }}
    needs:
      [
        test-laurus,
        test-cli,
        test-server,
        test-mcp,
        test-python,
        test-nodejs,
        test-wasm,
        test-ruby,
        test-php,
      ]
    runs-on: ubuntu-latest
    steps:
      - name: All tests passed
        run: echo "All tests passed"

  # ============================================================
  # Build release binaries
  # ============================================================
  build-binary:
    name: Build Binary
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [test-all]
    strategy:
      matrix:
        platform:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: laurus
            archive: tar.gz
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            binary: laurus
            archive: tar.gz
          - runner: macos-latest
            target: aarch64-apple-darwin
            binary: laurus
            archive: tar.gz
          - runner: macos-15-intel
            target: x86_64-apple-darwin
            binary: laurus
            archive: tar.gz
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
            binary: laurus.exe
            archive: zip
          - runner: windows-latest
            target: aarch64-pc-windows-msvc
            binary: laurus.exe
            archive: zip
    runs-on: ${{ matrix.platform.runner }}
    steps:
      - name: Run checkout
        uses: actions/checkout@v6

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "24.x"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          target: ${{ matrix.platform.target }}

      - name: Build binary
        run: cargo build --release --target ${{ matrix.platform.target }} -p laurus-cli --features embeddings-all

      - name: Package binary (Unix)
        if: runner.os == 'Linux' || runner.os == 'macOS'
        run: |
          tar \
            -czf "laurus-${{ github.ref_name }}-${{ matrix.platform.target }}.tar.gz" \
            -C "target/${{ matrix.platform.target }}/release" "${{ matrix.platform.binary }}"

      - name: Package binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive `
            -Path "target/${{ matrix.platform.target }}/release/${{ matrix.platform.binary }}" `
            -DestinationPath "laurus-${{ github.ref_name }}-${{ matrix.platform.target }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: laurus-${{ matrix.platform.target }}
          path: laurus-${{ github.ref_name }}-${{ matrix.platform.target }}.${{ matrix.platform.archive }}

  # ============================================================
  # Build Python source distribution
  # ============================================================
  build-python-sdist:
    name: Build Python sdist
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [test-all]
    runs-on: ubuntu-latest
    steps:
      - name: Run checkout
        uses: actions/checkout@v6

      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --manifest-path laurus-python/Cargo.toml --out dist

      - name: Upload sdist
        uses: actions/upload-artifact@v7
        with:
          name: wheels-sdist
          path: dist/*.tar.gz

  # ============================================================
  # Build Python wheels for multiple platforms
  # ============================================================
  build-wheel:
    name: Build Python Wheel
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [test-all]
    strategy:
      matrix:
        platform:
          - runner: ubuntu-latest
            target: x86_64
          - runner: ubuntu-24.04-arm
            target: aarch64
          - runner: macos-latest
            target: aarch64
          - runner: macos-15-intel
            target: x86_64
          - runner: windows-latest
            target: x86_64
          - runner: windows-11-arm
            target: aarch64
    runs-on: ${{ matrix.platform.runner }}
    steps:
      - name: Run checkout
        uses: actions/checkout@v6

      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist --manifest-path laurus-python/Cargo.toml --features embeddings-all

      - name: Upload wheel
        uses: actions/upload-artifact@v7
        with:
          name: wheels-${{ matrix.platform.runner }}-${{ matrix.platform.target }}
          path: dist/*.whl

  # ============================================================
  # Build Node.js native binaries
  # ============================================================
  build-nodejs:
    name: Build Node.js Native
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [test-all]
    strategy:
      fail-fast: false
      matrix:
        settings:
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - host: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - host: macos-latest
            target: aarch64-apple-darwin
          - host: macos-15-intel
            target: x86_64-apple-darwin
          - host: windows-latest
            target: x86_64-pc-windows-msvc
          - host: windows-11-arm
            target: aarch64-pc-windows-msvc
    runs-on: ${{ matrix.settings.host }}
    steps:
      - name: Run checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          target: ${{ matrix.settings.target }}

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "stable-${{ matrix.settings.target }}"

      - name: Install dependencies and build
        working-directory: laurus-nodejs
        shell: bash
        run: |
          npm install
          npx napi build --platform --release -p laurus-nodejs --target ${{ matrix.settings.target }} --features embeddings-all

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: nodejs-binding-${{ matrix.settings.target }}
          path: laurus-nodejs/*.node
          if-no-files-found: error

  # ============================================================
  # Build WASM packages
  # ============================================================
  build-wasm:
    name: Build WASM
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [test-all]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        wasm-target: [web, bundler]
    steps:
      - name: Run checkout
        uses: actions/checkout@v6

      - name: Install toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "stable-wasm32-unknown-unknown"

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build with wasm-pack
        working-directory: laurus-wasm
        run: wasm-pack build --target ${{ matrix.wasm-target }} --release

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: wasm-${{ matrix.wasm-target }}
          path: laurus-wasm/pkg/
          if-no-files-found: error

  # ============================================================
  # Build Ruby native gems
  # ============================================================
  build-ruby:
    name: Build Ruby Native
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [test-all]
    strategy:
      fail-fast: false
      matrix:
        platform:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - runner: macos-latest
            target: aarch64-apple-darwin
          - runner: macos-15-intel
            target: x86_64-apple-darwin
    runs-on: ${{ matrix.platform.runner }}
    steps:
      - name: Run checkout
        uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "4.0"
          bundler-cache: true
          working-directory: laurus-ruby

      - name: Install toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          target: ${{ matrix.platform.target }}

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "stable-${{ matrix.platform.target }}"

      - name: Build native extension
        working-directory: laurus-ruby
        shell: bash
        env:
          RB_SYS_CARGO_FEATURES: embeddings-all
        run: |
          bundle install
          bundle exec rake compile

      - name: Package artifact
        shell: bash
        run: |
          EXT=$(find laurus-ruby/lib -name "laurus_ruby.*" -type f | head -1)
          SUFFIX="${EXT##*.}"
          cp "$EXT" "laurus_ruby.${SUFFIX}"
          tar -czf "laurus_ruby-${{ github.ref_name }}-${{ matrix.platform.target }}.tar.gz" "laurus_ruby.${SUFFIX}"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ruby-native-${{ matrix.platform.target }}
          path: laurus_ruby-${{ github.ref_name }}-${{ matrix.platform.target }}.tar.gz
          if-no-files-found: error

  # ============================================================
  # Build PHP native extensions
  # ============================================================
  build-php:
    name: Build PHP Native
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [test-all]
    strategy:
      fail-fast: false
      matrix:
        platform:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            ext: so
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            ext: so
          - runner: macos-latest
            target: aarch64-apple-darwin
            ext: dylib
          - runner: macos-15-intel
            target: x86_64-apple-darwin
            ext: dylib
        php: ["8.5"]
    runs-on: ${{ matrix.platform.runner }}
    steps:
      - name: Run checkout
        uses: actions/checkout@v6

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}

      - name: Install toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          target: ${{ matrix.platform.target }}

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "stable-${{ matrix.platform.target }}"

      - name: Build PHP extension
        shell: bash
        run: |
          if [ "$RUNNER_OS" == "macOS" ]; then
            export RUSTFLAGS="-C link-args=-Wl,-undefined,dynamic_lookup"
          fi
          cargo build --release -p laurus-php --features embeddings-all

      - name: Package artifact
        shell: bash
        run: |
          cp target/release/liblaurus_php.${{ matrix.platform.ext }} \
             laurus_php.${{ matrix.platform.ext }}
          tar -czf "laurus_php-${{ github.ref_name }}-${{ matrix.platform.target }}.tar.gz" \
             "laurus_php.${{ matrix.platform.ext }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: php-native-${{ matrix.platform.target }}
          path: laurus_php-${{ github.ref_name }}-${{ matrix.platform.target }}.tar.gz
          if-no-files-found: error

  # ============================================================
  # Create GitHub Release and upload all artifacts
  # ============================================================
  create-release:
    name: Create Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      [
        build-binary,
        build-wheel,
        build-python-sdist,
        build-nodejs,
        build-wasm,
        build-ruby,
        build-php,
      ]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download binary artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          pattern: "laurus-*"
          merge-multiple: true

      - name: Download Ruby artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          pattern: "ruby-native-*"
          merge-multiple: true

      - name: Download PHP artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          pattern: "php-native-*"
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          make_latest: true
          files: artifacts/*

  # ============================================================
  # Publish crates to crates.io
  # ============================================================
  publish-crates:
    name: Publish crates
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [create-release]
    runs-on: ubuntu-latest
    steps:
      - name: Run checkout
        uses: actions/checkout@v6

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "24.x"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable

      - name: Publish crates
        run: |
          wait_for_crate() {
            local crate=$1 version=$2
            echo "Waiting for $crate $version to appear in crates.io index..."
            for i in $(seq 1 30); do
              if curl -s -A "laurus-release-workflow" "https://crates.io/api/v1/crates/$crate/$version" | jq -e '.version' >/dev/null 2>&1; then
                echo "$crate $version is now available"
                return 0
              fi
              echo "  attempt $i/30 — not yet available, waiting 10s..."
              sleep 10
            done
            echo "WARNING: timed out waiting for $crate $version (5 min), proceeding anyway"
            return 0
          }

          for crate in laurus laurus-server laurus-mcp laurus-cli; do
            VERSION=$(cargo metadata --no-deps --format-version=1 | jq -r ".packages[] | select(.name==\"$crate\") | .version")
            PUBLISHED_VERSIONS=$(curl -s -A "laurus-release-workflow (https://github.com/mosuka/laurus)" "https://crates.io/api/v1/crates/$crate" | jq -r 'select(.versions != null) | .versions[].num')
            if echo "${PUBLISHED_VERSIONS}" | grep -Fx "${VERSION}" >/dev/null; then
              echo "$crate $VERSION has already been published"
            else
              echo "Publishing $crate $VERSION..."
              pushd $crate
              cargo publish
              popd
              wait_for_crate "$crate" "$VERSION"
            fi
          done
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  # ============================================================
  # Publish Python package to PyPI
  # ============================================================
  publish-pypi:
    name: Publish to PyPI
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [create-release]
    runs-on: ubuntu-latest
    steps:
      - name: Download wheels and sdist
        uses: actions/download-artifact@v8
        with:
          path: dist
          pattern: "wheels-*"
          merge-multiple: true

      - name: Publish to PyPI
        uses: PyO3/maturin-action@v1
        env:
          MATURIN_PYPI_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        with:
          command: upload
          args: --non-interactive --skip-existing dist/*

  # ============================================================
  # Publish Node.js package to npm
  # ============================================================
  publish-npm:
    name: Publish to npm
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [create-release]
    runs-on: ubuntu-latest
    steps:
      - name: Run checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Download all Node.js artifacts
        uses: actions/download-artifact@v8
        with:
          path: laurus-nodejs/artifacts
          pattern: "nodejs-binding-*"
          merge-multiple: true

      - name: Sync version from Cargo.toml
        working-directory: laurus-nodejs
        shell: bash
        run: |
          VERSION=$(cargo metadata --no-deps --format-version=1 \
            | jq -r '.packages[] | select(.name=="laurus-nodejs") | .version')
          echo "Syncing npm version to ${VERSION}"
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '${VERSION}';
            if (pkg.optionalDependencies) {
              for (const key of Object.keys(pkg.optionalDependencies)) {
                pkg.optionalDependencies[key] = '${VERSION}';
              }
            }
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Install dependencies
        working-directory: laurus-nodejs
        run: npm install

      - name: Prepare npm packages
        working-directory: laurus-nodejs
        run: |
          npx napi create-npm-dirs
          npx napi artifacts --output-dir artifacts

      - name: Publish to npm
        working-directory: laurus-nodejs
        shell: bash
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          PACKAGE_VERSION=$(node -p "require('./package.json').version")

          if npm view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version 2>/dev/null; then
            echo "${PACKAGE_NAME}@${PACKAGE_VERSION} has already been published, skipping"
            exit 0
          fi

          # Publish platform-specific packages first
          for dir in npm/*/; do
            if [ -f "${dir}package.json" ]; then
              PKG=$(node -p "require('./${dir}package.json').name")
              PKG_VER=$(node -p "require('./${dir}package.json').version")
              if npm view "${PKG}@${PKG_VER}" version 2>/dev/null; then
                echo "${PKG}@${PKG_VER} already published, skipping"
              else
                echo "Publishing ${PKG}@${PKG_VER}..."
                pushd "${dir}"
                npm publish --access public
                popd
              fi
            fi
          done

          # Publish the main package
          npm publish --access public

  # ============================================================
  # Publish WASM package to npm
  # ============================================================
  publish-wasm-npm:
    name: Publish WASM (${{ matrix.wasm-target }}) to npm
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [create-release]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        wasm-target: [web, bundler]
    steps:
      - name: Run checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Install toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build with wasm-pack
        working-directory: laurus-wasm
        run: wasm-pack build --target ${{ matrix.wasm-target }} --release

      - name: Sync version and package name from Cargo.toml
        working-directory: laurus-wasm/pkg
        shell: bash
        run: |
          VERSION=$(cargo metadata --no-deps --format-version=1 \
            --manifest-path "${{ github.workspace }}/laurus-wasm/Cargo.toml" \
            | jq -r '.packages[] | select(.name=="laurus-wasm") | .version')
          echo "Syncing npm version to ${VERSION} and package name to laurus-wasm-${{ matrix.wasm-target }}"
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.name = 'laurus-wasm-${{ matrix.wasm-target }}';
            pkg.version = '${VERSION}';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Publish to npm
        working-directory: laurus-wasm/pkg
        shell: bash
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          PACKAGE_VERSION=$(node -p "require('./package.json').version")

          if npm view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version 2>/dev/null; then
            echo "${PACKAGE_NAME}@${PACKAGE_VERSION} has already been published, skipping"
            exit 0
          fi

          npm publish --access public

  # ============================================================
  # Publish Ruby gem to RubyGems.org
  # ============================================================
  publish-rubygems:
    name: Publish to RubyGems
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [create-release]
    runs-on: ubuntu-latest
    steps:
      - name: Run checkout
        uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "4.0"
          bundler-cache: true
          working-directory: laurus-ruby

      - name: Install toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable

      - name: Download Ruby artifacts
        uses: actions/download-artifact@v8
        with:
          path: laurus-ruby/artifacts
          pattern: "ruby-native-*"
          merge-multiple: true

      - name: Sync gem version from Cargo.toml
        working-directory: laurus-ruby
        shell: bash
        run: |
          VERSION=$(cargo metadata --no-deps --format-version=1 \
            | jq -r '.packages[] | select(.name=="laurus-ruby") | .version')
          echo "Syncing gem version to ${VERSION}"
          sed -i "s/spec\.version\s*=.*/spec.version       = \"${VERSION}\"/" laurus.gemspec

      - name: Build gem
        working-directory: laurus-ruby
        shell: bash
        run: |
          bundle install
          bundle exec rake compile
          gem build *.gemspec

      - name: Publish to RubyGems
        working-directory: laurus-ruby
        shell: bash
        env:
          GEM_HOST_API_KEY: ${{ secrets.GEM_HOST_API_KEY }}
        run: |
          GEM_FILE=$(ls *.gem | head -1)
          GEM_NAME=$(ruby -e "spec = Gem::Specification.load(Dir['*.gemspec'].first); puts spec.name")
          GEM_VERSION=$(ruby -e "spec = Gem::Specification.load(Dir['*.gemspec'].first); puts spec.version")

          if gem list -r "${GEM_NAME}" --exact --versions "${GEM_VERSION}" | grep -q "${GEM_NAME} (${GEM_VERSION})"; then
            echo "${GEM_NAME} ${GEM_VERSION} has already been published, skipping"
            exit 0
          fi

          gem push "${GEM_FILE}"
