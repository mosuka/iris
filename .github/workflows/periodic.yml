name: Periodic

on:
  workflow_dispatch:
  schedule:
    - cron: 0 0 * * SUN

jobs:
  # ============================================================
  # Format code with rustfmt
  # ============================================================
  format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - name: Run checkout
        uses: actions/checkout@v6

      - name: Install toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          components: rustfmt

      - name: Run format
        run: cargo fmt --all -- --check

  # ============================================================
  # Lint with clippy
  # ============================================================
  clippy:
    name: Clippy
    needs: [format]
    runs-on: ubuntu-latest
    steps:
      - name: Run checkout
        uses: actions/checkout@v6

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "24.x"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          components: clippy

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "stable-x86_64-unknown-linux-gnu"

      - name: Run clippy
        run: cargo clippy --all-targets --features embeddings-all -- -D warnings

  # ============================================================
  # Test laurus (core library)
  # ============================================================
  test-laurus:
    name: Test laurus
    needs: [clippy]
    strategy:
      fail-fast: false
      matrix:
        platform:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            skip_embedding_features: true
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
        toolchain: [stable, beta, nightly]
    runs-on: ${{ matrix.platform.runner }}
    steps:
      - name: Run checkout
        uses: actions/checkout@v6

      - name: Install toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ matrix.toolchain }}
          target: ${{ matrix.platform.target }}

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "${{ matrix.toolchain }}-${{ matrix.platform.target }}"

      - name: Run test
        shell: bash
        run: |
          if [ "${{ matrix.platform.skip_embedding_features }}" == "true" ]; then
            FEATURES=""
          else
            FEATURES="--features embeddings-all"
          fi

          cargo test --package laurus --target "${{ matrix.platform.target }}" $FEATURES

  # ============================================================
  # Test laurus-server
  # ============================================================
  test-server:
    name: Test laurus-server
    needs: [test-laurus]
    strategy:
      fail-fast: false
      matrix:
        platform:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            skip_embedding_features: true
        toolchain: [stable, beta, nightly]
    runs-on: ${{ matrix.platform.runner }}
    steps:
      - name: Run checkout
        uses: actions/checkout@v6

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "24.x"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ matrix.toolchain }}
          target: ${{ matrix.platform.target }}

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "${{ matrix.toolchain }}-${{ matrix.platform.target }}"

      - name: Run test
        shell: bash
        run: |
          if [ "${{ matrix.platform.skip_embedding_features }}" == "true" ]; then
            FEATURES=""
          else
            FEATURES="--features embeddings-all"
          fi

          cargo test --package laurus-server --target "${{ matrix.platform.target }}" $FEATURES

  # ============================================================
  # Test laurus-mcp
  # ============================================================
  test-mcp:
    name: Test laurus-mcp
    needs: [test-laurus, test-server]
    strategy:
      fail-fast: false
      matrix:
        platform:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            skip_embedding_features: true
        toolchain: [stable, beta, nightly]
    runs-on: ${{ matrix.platform.runner }}
    steps:
      - name: Run checkout
        uses: actions/checkout@v6

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "24.x"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ matrix.toolchain }}
          target: ${{ matrix.platform.target }}

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "${{ matrix.toolchain }}-${{ matrix.platform.target }}"

      - name: Run test
        shell: bash
        run: |
          if [ "${{ matrix.platform.skip_embedding_features }}" == "true" ]; then
            FEATURES=""
          else
            FEATURES="--features embeddings-all"
          fi

          cargo test --package laurus-mcp --target "${{ matrix.platform.target }}" $FEATURES

  # ============================================================
  # Test laurus-cli
  # ============================================================
  test-cli:
    name: Test laurus-cli
    needs: [test-laurus, test-server, test-mcp]
    strategy:
      fail-fast: false
      matrix:
        platform:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            skip_embedding_features: true
        toolchain: [stable, beta, nightly]
    runs-on: ${{ matrix.platform.runner }}
    steps:
      - name: Run checkout
        uses: actions/checkout@v6

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "24.x"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ matrix.toolchain }}
          target: ${{ matrix.platform.target }}

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "${{ matrix.toolchain }}-${{ matrix.platform.target }}"

      - name: Run test
        shell: bash
        run: |
          if [ "${{ matrix.platform.skip_embedding_features }}" == "true" ]; then
            FEATURES=""
          else
            FEATURES="--features embeddings-all"
          fi

          cargo test --package laurus-cli --target "${{ matrix.platform.target }}" $FEATURES

  # ============================================================
  # Test laurus-python
  # ============================================================
  test-python:
    name: Test laurus-python
    needs: [test-laurus]
    strategy:
      fail-fast: false
      matrix:
        platform:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            skip_embedding_features: true
        python: ["3.13"]
    runs-on: ${{ matrix.platform.runner }}
    steps:
      - name: Run checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}

      - name: Install toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "stable-${{ matrix.platform.target }}"

      - name: Run tests
        working-directory: laurus-python
        shell: bash
        run: |
          python -m venv .venv
          if [ "$RUNNER_OS" == "Windows" ]; then
            source .venv/Scripts/activate
          else
            source .venv/bin/activate
          fi
          pip install maturin pytest
          if [ "${{ matrix.platform.skip_embedding_features }}" == "true" ]; then
            maturin develop
          else
            maturin develop --features embeddings-all
          fi
          pytest tests/ -v

  # ============================================================
  # Test laurus-nodejs
  # ============================================================
  test-nodejs:
    name: Test laurus-nodejs
    needs: [test-laurus]
    strategy:
      fail-fast: false
      matrix:
        platform:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
        node: ["22"]
    runs-on: ${{ matrix.platform.runner }}
    steps:
      - name: Run checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}

      - name: Install toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "stable-${{ matrix.platform.target }}"

      - name: Run tests
        working-directory: laurus-nodejs
        shell: bash
        run: |
          npm install
          npm run build:debug
          npm test

  # ============================================================
  # Test laurus-ruby
  # ============================================================
  test-ruby:
    name: Test laurus-ruby
    needs: [test-laurus]
    strategy:
      fail-fast: false
      matrix:
        platform:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
        ruby: ["4.0"]
    runs-on: ${{ matrix.platform.runner }}
    steps:
      - name: Run checkout
        uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true
          working-directory: laurus-ruby

      - name: Install toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "stable-${{ matrix.platform.target }}"

      - name: Run tests
        working-directory: laurus-ruby
        shell: bash
        run: |
          bundle exec rake compile
          bundle exec ruby -Ilib -Itest -e 'Dir["test/test_*.rb"].each { |f| require_relative f }'

  # ============================================================
  # Test laurus-php
  # ============================================================
  test-php:
    name: Test laurus-php
    needs: [test-laurus]
    strategy:
      fail-fast: false
      matrix:
        platform:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            skip_embedding_features: true
        php: ["8.5"]
    runs-on: ${{ matrix.platform.runner }}
    steps:
      - name: Run checkout
        uses: actions/checkout@v6

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}

      - name: Install toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "stable-${{ matrix.platform.target }}"

      - name: Build PHP extension
        shell: bash
        run: |
          if [ "${{ matrix.platform.skip_embedding_features }}" == "true" ]; then
            cargo build --release -p laurus-php
          else
            cargo build --release -p laurus-php --features embeddings-all
          fi

      - name: Run tests
        working-directory: laurus-php
        shell: bash
        run: |
          composer install
          php -d extension=../target/release/liblaurus_php.so vendor/bin/phpunit tests/LaurusTest.php
